<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KANIE STORE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    .container {
      width: 400px;
      height: 300px;
      background: rgba(29, 29, 31, 0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #E8E8ED, #B8B8C0, #68686F);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .logo svg {
      width: 40px;
      height: 40px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffffff;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .loader {
      width: 120px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0A84FF, #5AC8FA);
      border-radius: 2px;
      animation: loading 2s ease-in-out forwards;
    }
    @keyframes loading {
      0% { width: 0%; }
      30% { width: 40%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 814 1000" fill="#2C2C2E">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.5 135.4-317.3 269-317.3 70.1 0 128.4 46.4 172.5 46.4 42.8 0 109.3-49.1 188.3-49.1 30.5.1 110.8 2.9 173.3 71.1zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
      </svg>
    </div>
    <div class="title">KANIE STORE</div>
    <div class="subtitle">Powered by Nagoya Digital</div>
    <div class="loader"><div class="loader-bar"></div></div>
    <div class="version">v1.0.0</div>
  </div>
</body>
</html>
